meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands: sh -c "cd dispatcher_web && npm ci && npm run build"
  artifacts:
    "*": /
run:
  scriptName: null
  scriptArguments: null
  nodeArguments: null
  command: sh -c "cd /dispatcher_web && npm run start"
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"
